name: Deploy to Server

on:
  push:
    branches:
      - main  # or 'master' - change this to your default branch name

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd "/home/lenovo/6-2-2026-GPS/Latest GPS"
            # 1. Update the code from GitHub
            git fetch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
            git reset --hard FETCH_HEAD
            
            # 2. Update dependencies
            ./venv/bin/python3 -m pip install -r requirements.txt
            
            # 3. Kill old process and start new one
            pkill -f "app.py" || true
            sleep 2
            # Use setsid so the app detaches into its OWN session and survives the
            # SSH session closing when this step finishes. With plain "nohup ... &"
            # the background process gets reaped when ssh-action disconnects, which
            # leaves nothing listening on port 7777.
            setsid nohup ./venv/bin/python3 app.py < /dev/null > output.log 2>&1 &

            # 4. Verify it actually started; fail loudly (and show the log) if not.
            sleep 5
            if pgrep -f "app.py" > /dev/null; then
              echo "✅ Deployment Successful! app.py running (PID $(pgrep -f 'app.py' | tr '\n' ' ')) at http://103.250.160.75:7777"
            else
              echo "❌ app.py did NOT start. Last 40 lines of output.log:"
              tail -n 40 output.log || true
              exit 1
            fi
