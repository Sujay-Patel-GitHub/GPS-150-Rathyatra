name: Deploy to Server

on:
  push:
    branches:
      - main  # or 'master' - change this to your default branch name

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd "/home/lenovo/6-2-2026-GPS/Latest GPS"
            # Use the venv python explicitly and disown the process so it stays running
            ./venv/bin/python3 -m pip install -r requirements.txt
            pkill -f "app.py" || true
            nohup ./venv/bin/python3 app.py > output.log 2>&1 & 
            sleep 2
            echo "✅ Deployment Successful!"
