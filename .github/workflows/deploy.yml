name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 150.129.165.162
          username: lenovo1
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/lenovo1/LatestGPS
            git fetch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
            git reset --hard FETCH_HEAD
            ./venv/bin/python3 -m pip install -r requirements.txt --quiet
            if sudo -n systemctl restart gps-server.service 2>/dev/null; then
              echo "Restarted via systemd"
            else
              pkill -f "app.py" || true
            fi
            sleep 8
            if pgrep -f "app.py" > /dev/null; then
              echo "Deployment Successful! http://150.129.165.162:7777"
            else
              tail -n 40 /home/lenovo1/LatestGPS/output.log || true
              exit 1
            fi
