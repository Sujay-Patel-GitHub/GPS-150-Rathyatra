<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MongoDB Live Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  .header { background: #1e293b; padding: 16px 28px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #334155; }
  .header h1 { font-size: 1.3rem; font-weight: 700; color: #38bdf8; }
  .header .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .header .sub { font-size: 0.8rem; color: #64748b; margin-left: auto; }
  .layout { display: flex; height: calc(100vh - 57px); }
  .sidebar { width: 260px; background: #1e293b; border-right: 1px solid #334155; overflow-y: auto; flex-shrink: 0; }
  .sidebar-title { padding: 14px 16px 8px; font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .08em; }
  .col-item { padding: 8px 10px 8px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all .15s; display: flex; align-items: center; gap: 6px; }
  .col-item:hover { background: #263449; }
  .col-item:hover .del-btn { opacity: 1 !important; }
  .col-item.active { background: #1d3a5f; border-left-color: #38bdf8; }
  .col-name { font-size: 0.88rem; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .col-badge { background: #334155; color: #94a3b8; font-size: 0.7rem; padding: 2px 7px; border-radius: 999px; flex-shrink: 0; }
  .col-item.active .col-badge { background: #0ea5e9; color: #fff; }
  .del-btn { opacity: 0; background: none; border: none; color: #f87171; cursor: pointer; font-size: 0.95rem; padding: 3px 6px; border-radius: 5px; flex-shrink: 0; transition: opacity .15s, background .15s; }
  .del-btn:hover { background: #7f1d1d55 !important; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .toolbar { padding: 12px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .toolbar h2 { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
  .refresh-btn { background: #0ea5e9; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
  .refresh-btn:hover { background: #0284c7; }
  .back-btn { background: #334155; color: #e2e8f0; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
  .back-btn:hover { background: #475569; }
  .auto-label { font-size: 0.78rem; color: #64748b; display: flex; align-items: center; gap: 6px; }
  .auto-label input { accent-color: #0ea5e9; }
  .table-wrap { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.81rem; }
  thead th { background: #1e293b; color: #94a3b8; font-weight: 700; text-transform: uppercase; font-size: 0.68rem; letter-spacing: .06em; padding: 9px 12px; position: sticky; top: 0; text-align: left; border-bottom: 1px solid #334155; white-space: nowrap; }
  thead th.gps-h  { color: #34d399; }
  thead th.acc-h  { color: #f59e0b; }
  thead th.gyr-h  { color: #a78bfa; }
  thead th.tmp-h  { color: #fb7185; }
  thead th.meta-h { color: #64748b; }
  tbody tr { border-bottom: 1px solid #1e293b; transition: background .1s; }
  tbody tr:hover { background: #1e3a5f22; }
  tbody td { padding: 8px 12px; color: #cbd5e1; vertical-align: middle; white-space: nowrap; }
  .gps-val  { font-family: monospace; color: #34d399; }
  .acc-val  { font-family: monospace; color: #fcd34d; }
  .gyr-val  { font-family: monospace; color: #c4b5fd; }
  .tmp-val  { color: #fda4af; }
  .truck-id { color: #38bdf8; font-weight: 700; }
  .ts-val   { color: #475569; font-size: 0.72rem; }
  .motion-badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
  .m-still   { background:#1e293b; color:#64748b; border:1px solid #334155; }
  .m-idle    { background:#422006; color:#fb923c; border:1px solid #9a3412; }
  .m-moving  { background:#14532d; color:#4ade80; border:1px solid #166534; }
  .m-rough   { background:#450a0a; color:#f87171; border:1px solid #7f1d1d; }
  .m-unknown { background:#1e293b; color:#475569; border:1px solid #334155; }
  /* Group headers in table */
  .grp-sep th { background: #0f2744; padding: 4px 12px; font-size: 0.65rem; letter-spacing: .1em; border-top: 1px solid #1e4080; border-bottom: 1px solid #1e4080; }
  .empty { text-align: center; padding: 60px; color: #475569; }
  .empty i { font-size: 2.5rem; margin-bottom: 12px; display: block; }
  /* Truck cards */
  .truck-grid { display: flex; flex-wrap: wrap; gap: 14px; padding: 20px; overflow-y: auto; flex: 1; align-content: flex-start; }
  .truck-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 18px; width: 230px; cursor: pointer; transition: border-color .15s, background .15s; }
  .truck-card:hover { border-color: #38bdf8; background: #1d3a5f; }
  .truck-card h3 { font-size: 1rem; font-weight: 700; color: #38bdf8; margin-bottom: 10px; }
  .tc-section { font-size: 0.7rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .07em; margin: 10px 0 4px; }
  .tc-row { font-size: 0.78rem; color: #64748b; margin-bottom: 3px; }
  .tc-row span { font-family: monospace; }
  .tc-row .gv { color: #34d399; }
  .tc-row .av { color: #fcd34d; }
  .tc-row .pv { color: #c4b5fd; }
  .tc-row .tv { color: #fda4af; }
  .tc-foot { font-size: 0.7rem; color: #334155; margin-top: 10px; }
  .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; }
  .placeholder svg { width: 64px; opacity: .2; }
  .placeholder p { font-size: 1rem; color: #475569; }
  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: #00000099; z-index: 999; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 28px; width: 360px; }
  .modal h3 { font-size: 1rem; font-weight: 700; color: #f87171; margin-bottom: 10px; }
  .modal p { font-size: .84rem; color: #94a3b8; margin-bottom: 22px; line-height: 1.6; }
  .modal p strong { color: #fbbf24; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel { background: #334155; color: #e2e8f0; border: none; padding: 8px 18px; border-radius: 7px; cursor: pointer; font-size: .85rem; font-weight: 600; }
  .btn-cancel:hover { background: #475569; }
  .btn-delete-confirm { background: #dc2626; color: #fff; border: none; padding: 8px 18px; border-radius: 7px; cursor: pointer; font-size: .85rem; font-weight: 600; }
  .btn-delete-confirm:hover { background: #b91c1c; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #166534; color: #dcfce7; padding: 10px 20px; border-radius: 8px; font-size: .85rem; font-weight: 600; opacity: 0; transform: translateY(10px); transition: all .3s; z-index: 1000; pointer-events: none; }
  .toast.error { background: #7f1d1d; color: #fecaca; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Device panels */
  .dev-section { border-top: 1px solid #1e3a5f; }
  .dev-section-title { padding: 10px 16px 6px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; display: flex; align-items: center; gap: 7px; }
  .dev-section-title.reg   { color: #22c55e; }
  .dev-section-title.unreg { color: #f59e0b; }
  .dev-section-title .dot-badge { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dev-section-title.reg   .dot-badge { background: #22c55e; }
  .dev-section-title.unreg .dot-badge { background: #f59e0b; animation: pulse 1.5s infinite; }
  .dev-section-title .dev-count { margin-left: auto; background: #334155; color: #94a3b8; font-size: 0.65rem; padding: 1px 7px; border-radius: 999px; }
  .dev-item { padding: 7px 10px 7px 16px; display: flex; align-items: center; gap: 7px; font-size: 0.84rem; font-weight: 600; border-left: 3px solid transparent; cursor: default; }
  .dev-item.reg-item { color: #86efac; border-left-color: #22c55e22; }
  .dev-item.unreg-item { color: #fcd34d; border-left-color: #f59e0b22; }
  .dev-action { margin-left: auto; border: none; border-radius: 5px; padding: 3px 9px; font-size: 0.7rem; font-weight: 700; cursor: pointer; flex-shrink: 0; }
  .btn-register   { background: #14532d; color: #86efac; }
  .btn-register:hover   { background: #166534; }
  .btn-unregister { background: #451a03; color: #fed7aa; }
  .btn-unregister:hover { background: #7c2d12; }
  .dev-empty { padding: 8px 16px 10px; font-size: 0.76rem; color: #475569; }

</style>
</head>
<body>
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>Delete Collection</h3>
    <p>Permanently delete <strong id="modalColName"></strong>?<br>Removes <strong id="modalColCount"></strong> documents. Cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-delete-confirm" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<div class="header">
  <div class="dot"></div>
  <h1>MongoDB Live Viewer</h1>
  <span class="sub">gps_server_db &nbsp;&middot;&nbsp; 150.129.165.162:27017</span>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">Collections</div>
    <div id="colList"><div style="padding:20px;color:#475569;font-size:.82rem;">Loading...</div></div>
    
    <div class="sidebar-title" style="border-top: 1px solid #334155; margin-top: 15px; padding-top: 15px;">Devices</div>
    <div class="dev-section">
      <div class="dev-section-title reg">
        <span class="dot-badge"></span>Registered
        <span class="dev-count" id="regCount">0</span>
      </div>
      <div id="regList"></div>
    </div>
    <div class="dev-section">
      <div class="dev-section-title unreg">
        <span class="dot-badge"></span>Unregistered
        <span class="dev-count" id="unregCount">0</span>
      </div>
      <div id="unregList"></div>
    </div>
  </div>
  <div class="main" id="mainPanel">
    <div class="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <ellipse cx="12" cy="5" rx="9" ry="3"/>
        <path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
        <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
      </svg>
      <p>Select a collection to view data</p>
    </div>
  </div>
</div>

<script>
let activeCol = null, autoRefresh = true, refreshTimer = null, activeTruck = null;
let deleteTarget = { name: "", count: 0 };
function esc(s) { return (s+"").replace(/\\/g,"\\\\").replace(/'/g,"\\'"); }
function n2(v, d=2) { return (v===null||v===undefined||v===""||isNaN(v)) ? "-" : parseFloat(v).toFixed(d); }
function motionBadge(m) {
  const map = {
    still:   ["m-still",   "⬛ Still"],
    idle:    ["m-idle",    "🟠 Idle"],
    moving:  ["m-moving",  "🟢 Moving"],
    rough:   ["m-rough",   "🔴 Rough"],
  };
  const [cls, label] = map[m] || ["m-unknown", "— ?"];
  return `<span class="motion-badge ${cls}">${label}</span>`;
}

// ── Sidebar ───────────────────────────────────────────────
async function loadCollections() {
  const res = await fetch("/api/mongo_collections");
  const cols = await res.json();
  const el = document.getElementById("colList");
  if (!cols.length) { el.innerHTML = "<div style='padding:20px;color:#475569;font-size:.82rem;'>No collections found</div>"; return; }
  el.innerHTML = cols.map(c => {
    const label = c.name === "new_devices" ? "&#128666;&nbsp;new_devices" : c.name;
    return `<div class="col-item ${c.name===activeCol?"active":""}" onclick="selectCol('${esc(c.name)}')">
      <span class="col-name">${label}</span>
      <span class="col-badge">${c.count.toLocaleString()}</span>
      <button class="del-btn" title="Delete" onclick="event.stopPropagation();askDelete('${esc(c.name)}',${c.count})">&#128465;</button>
    </div>`;
  }).join("");
}

async function selectCol(name) {
  // Clear any existing timer immediately to prevent race conditions
  clearInterval(refreshTimer);
  activeCol = name; 
  activeTruck = null;
  
  if (name === "new_devices") {
    await loadTruckGrid();
  } else {
    await loadData();
  }
}

// ── Truck grid ────────────────────────────────────────────
async function loadTruckGrid() {
  // Clear any existing timer immediately to prevent race conditions
  clearInterval(refreshTimer);
  
  const res = await fetch("/api/mongo_data/new_devices");
  const docs = await res.json();
  
  // Guard clause: If the user navigated away while the fetch was in flight, abort
  if (activeCol !== "new_devices" || activeTruck !== null) return;

  const trucks = {};
  for (const d of docs) { const t = d.truck_id || "unknown"; if (!trucks[t]) trucks[t] = []; trucks[t].push(d); }
  const ids = Object.keys(trucks).sort();

  if (!ids.length) {
    document.getElementById("mainPanel").innerHTML = `
      <div class="toolbar"><h2>&#128666; new_devices</h2>
        <label class="auto-label" style="margin-left:auto;"><input type="checkbox" ${autoRefresh?"checked":""} onchange="toggleAuto(this)"> Auto-refresh</label>
        <button class="refresh-btn" onclick="loadTruckGrid()">&#8635; Refresh</button>
      </div><div class="empty"><i>&#128666;</i>No trucks connected yet.</div>`;
    return;
  }

  const cards = ids.map(tid => {
    const latest = trucks[tid][0];
    return `<div class="truck-card" onclick="showTruckDetail('${esc(tid)}')">
      <h3>&#128666; ${tid}</h3>
      <div class="tc-section">GPS</div>
      <div class="tc-row">Lat: <span class="gv">${n2(latest.lat,6)}</span></div>
      <div class="tc-row">Lng: <span class="gv">${n2(latest.lng,6)}</span></div>
      <div class="tc-row">Speed: <span class="gv">${n2(latest.speed,1)} km/h</span></div>
      <div style="margin-top:10px">${motionBadge(latest.motion)}</div>
      <div class="tc-foot">${trucks[tid].length} records &nbsp;&middot;&nbsp; ${latest.timestamp||""}</div>
    </div>`;
  }).join("");

  document.getElementById("mainPanel").innerHTML = `
    <div class="toolbar">
      <h2>&#128666; new_devices</h2>
      <span style="font-size:.75rem;color:#94a3b8;background:#0f172a;padding:3px 10px;border-radius:999px;">${ids.length} truck${ids.length!==1?"s":""}</span>
      <label class="auto-label" style="margin-left:auto;"><input type="checkbox" ${autoRefresh?"checked":""} onchange="toggleAuto(this)"> Auto-refresh (4s)</label>
      <button class="refresh-btn" onclick="loadTruckGrid()">&#8635; Refresh</button>
      <span style="font-size:.72rem;color:#475569;" id="lastRefresh"></span>
    </div>
    <div class="truck-grid">${cards}</div>`;
  document.getElementById("lastRefresh").textContent = "Updated " + new Date().toLocaleTimeString();
  await loadCollections();
  
  // Clear again just in case another action happened, then set the interval
  clearInterval(refreshTimer);
  if (autoRefresh) refreshTimer = setInterval(loadTruckGrid, 4000);
}

// ── Truck detail table ────────────────────────────────────
async function showTruckDetail(truckId) {
  // Clear any existing timer immediately to prevent race conditions
  clearInterval(refreshTimer);
  activeTruck = truckId;
  
  const res = await fetch("/api/mongo_data/new_devices");
  const all = await res.json();
  
  // Guard clause: If the user navigated away while the fetch was in flight, abort
  if (activeTruck !== truckId || activeCol !== "new_devices") return;

  const docs = all.filter(d => d.truck_id === truckId);

  const rows = docs.map(d => `<tr>
    <td class="truck-id">${d.truck_id||""}</td>
    <td class="gps-val">${n2(d.lat,6)}</td>
    <td class="gps-val">${n2(d.lng,6)}</td>
    <td class="gps-val">${n2(d.speed,1)}</td>
    <td>${motionBadge(d.motion)}</td>
    <td class="ts-val">${d.timestamp||""}</td>
  </tr>`).join("");

  document.getElementById("mainPanel").innerHTML = `
    <div class="toolbar">
      <button class="back-btn" onclick="selectCol('new_devices')">&#8592; All Trucks</button>
      <h2>&#128666; ${truckId}</h2>
      <span style="font-size:.75rem;color:#94a3b8;background:#0f172a;padding:3px 10px;border-radius:999px;">${docs.length} records</span>
      <button class="btn-delete-confirm" style="background:#dc2626;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;margin-left:15px;" onclick="confirmDeleteTruck('${esc(truckId)}')">&#128465; Delete Truck</button>
      <label class="auto-label" style="margin-left:auto;"><input type="checkbox" ${autoRefresh?"checked":""} onchange="toggleAuto(this)"> Auto-refresh</label>
      <button class="refresh-btn" onclick="showTruckDetail('${esc(truckId)}')">&#8635; Refresh</button>
    </div>
    <div class="table-wrap"><table>
      <thead>
        <tr>
          <th class="meta-h">Truck</th>
          <th class="gps-h">Lat</th><th class="gps-h">Lng</th><th class="gps-h">Speed</th>
          <th class="meta-h">Motion</th>
          <th class="meta-h">Timestamp</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table></div>`;

  // Clear again just in case another action happened, then set the interval
  clearInterval(refreshTimer);
  if (autoRefresh) refreshTimer = setInterval(() => showTruckDetail(truckId), 4000);
}

// ── Generic collection ────────────────────────────────────
async function loadData() {
  if (!activeCol) return;
  
  // Clear any existing timer immediately to prevent race conditions
  clearInterval(refreshTimer);
  
  const res = await fetch("/api/mongo_data/" + activeCol);
  const docs = await res.json();
  
  // Guard clause: If the user navigated away while the fetch was in flight, abort
  if (activeCol === "new_devices" || activeTruck !== null) return;

  if (!docs.length) {
    document.getElementById("mainPanel").innerHTML = `<div class="toolbar"><h2>${activeCol}</h2></div><div class="empty"><i>&#128205;</i>No data yet.</div>`;
    return;
  }
  
  // Gather all unique keys across all documents to ensure all columns and data are shown
  const keySet = new Set();
  docs.forEach(d => Object.keys(d).forEach(k => keySet.add(k)));
  const keys = Array.from(keySet);

  const rows = docs.map(d => `<tr>${keys.map(k => {
    let v = d[k];
    if (v === null || v === undefined) {
      v = "";
    } else if (typeof v === 'object') {
      v = JSON.stringify(v);
    }
    
    // Highlight styling for critical keys
    if (k === "lat" || k === "lng" || k === "lon") {
      return `<td class="gps-val">${v}</td>`;
    }
    if (k === "speed") {
      return `<td class="gps-val" style="color: #34d399; font-weight: bold;">${v}</td>`;
    }
    if (k === "timestamp" || k === "created_at" || k === "updated_at") {
      return `<td class="ts-val">${v}</td>`;
    }
    if (k === "device_id" || k === "truck_id") {
      return `<td class="truck-id">${v}</td>`;
    }
    return `<td>${v}</td>`;
  }).join("")}</tr>`).join("");

  const theadHeaders = keys.map(k => {
    let cls = "";
    if (k === "lat" || k === "lng" || k === "lon" || k === "speed") cls = "gps-h";
    else if (k === "timestamp" || k === "created_at" || k === "updated_at") cls = "meta-h";
    else if (k === "device_id" || k === "truck_id") cls = "acc-h";
    return `<th class="${cls}">${k}</th>`;
  }).join("");

  document.getElementById("mainPanel").innerHTML = `
    <div class="toolbar">
      <h2>${activeCol}</h2>
      <span style="font-size:.75rem;color:#94a3b8;background:#0f172a;padding:3px 10px;border-radius:999px;">${docs.length} rows</span>
      <label class="auto-label" style="margin-left:auto;"><input type="checkbox" ${autoRefresh?"checked":""} onchange="toggleAuto(this)"> Auto-refresh (4s)</label>
      <button class="refresh-btn" onclick="loadData()">&#8635; Refresh</button>
      <span style="font-size:.72rem;color:#475569;" id="lastRefresh"></span>
    </div>
    <div class="table-wrap"><table>
      <thead><tr>${theadHeaders}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
  document.getElementById("lastRefresh").textContent = "Updated " + new Date().toLocaleTimeString();
  await loadCollections();
  
  // Clear again just in case another action happened, then set the interval
  clearInterval(refreshTimer);
  if (autoRefresh) refreshTimer = setInterval(loadData, 4000);
}

function toggleAuto(cb) {
  autoRefresh = cb.checked;
  clearInterval(refreshTimer);
  if (!autoRefresh || !activeCol) return;
  if (activeCol === "new_devices") {
    refreshTimer = activeTruck ? setInterval(()=>showTruckDetail(activeTruck),4000) : setInterval(loadTruckGrid,4000);
  } else {
    refreshTimer = setInterval(loadData, 4000);
  }
}

// ── Delete ────────────────────────────────────────────────
function askDelete(name, count) {
  deleteTarget = {name, count};
  document.getElementById("modalColName").textContent = name;
  document.getElementById("modalColCount").textContent = count.toLocaleString();
  document.getElementById("modalBg").classList.add("open");
}
function closeModal() { document.getElementById("modalBg").classList.remove("open"); }
async function confirmDelete() {
  closeModal();
  const name = deleteTarget.name;
  try {
    const r = await fetch("/api/mongo_drop/"+encodeURIComponent(name),{method:"DELETE"});
    const d = await r.json();
    if (d.ok) {
      showToast("Deleted: "+name, false);
      if (activeCol===name) { activeCol=null; activeTruck=null; clearInterval(refreshTimer);
        document.getElementById("mainPanel").innerHTML=`<div class="placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg><p>Select a collection to view data</p></div>`;
      }
      await loadCollections();
    } else showToast("Error: "+d.error, true);
  } catch(e) { showToast("Network error", true); }
}
async function confirmDeleteTruck(truckId) {
  if (!confirm(`Are you sure you want to permanently delete truck "${truckId}" and all its telemetry data, live positions, and history?\n\nThis action cannot be undone.`)) {
    return;
  }
  try {
    const res = await fetch("/api/devices/unregister/" + encodeURIComponent(truckId), {
      method: "DELETE"
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`Truck "${truckId}" and all associated data deleted successfully.`, false);
      selectCol("new_devices");
    } else {
      alert("Error: " + (data.error || "Failed to delete truck."));
    }
  } catch (err) {
    console.error("Delete failed:", err);
    alert("Connection error: Failed to delete truck.");
  }
}
function showToast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast"+(isError?" error":"")+" show";
  setTimeout(()=>t.classList.remove("show"), 3000);
}
document.getElementById("modalBg").addEventListener("click", e=>{ if(e.target.id==="modalBg") closeModal(); });

// ── Device Registration Panels ────────────────────────────
async function loadDevicePanels() {
  try {
    const res = await fetch("/api/devices/all");
    const data = await res.json();

    const unregEl = document.getElementById("unregList");
    const regEl   = document.getElementById("regList");
    const unregCountEl = document.getElementById("unregCount");
    const regCountEl = document.getElementById("regCount");

    if (unregCountEl) unregCountEl.textContent = data.unregistered.length;
    if (regCountEl) regCountEl.textContent   = data.registered.length;

    if (unregEl) {
      if (data.unregistered.length === 0) {
        unregEl.innerHTML = '<div class="dev-empty">No unregistered devices</div>';
      } else {
        unregEl.innerHTML = data.unregistered.map(id =>
          `<div class="dev-item unreg-item">
            <span>${id}</span>
            <button class="dev-action btn-register" onclick="registerDevice('${id}')">Register</button>
          </div>`
        ).join("");
      }
    }

    if (regEl) {
      if (data.registered.length === 0) {
        regEl.innerHTML = '<div class="dev-empty">No registered devices</div>';
      } else {
        regEl.innerHTML = data.registered.map(id =>
          `<div class="dev-item reg-item">
            <span>${id}</span>
            <button class="dev-action btn-unregister" onclick="unregisterDevice('${id}')">Remove</button>
          </div>`
        ).join("");
      }
    }
  } catch(e) {
    console.error("Device panel error:", e);
  }
}

async function registerDevice(truckId) {
  await fetch("/api/devices/register/" + encodeURIComponent(truckId), { method: "POST" });
  showToast(truckId + " registered!", false);
  loadDevicePanels();
}

async function unregisterDevice(truckId) {
  await fetch("/api/devices/unregister/" + encodeURIComponent(truckId), { method: "DELETE" });
  showToast(truckId + " removed from registered.", true);
  loadDevicePanels();
}

loadCollections();
loadDevicePanels();
setInterval(loadCollections, 10000);
setInterval(loadDevicePanels, 10000);
</script>
