<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MongoDB Live Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

  .header { background: #1e293b; padding: 16px 28px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #334155; }
  .header h1 { font-size: 1.3rem; font-weight: 700; color: #38bdf8; }
  .header .dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .header .sub { font-size: 0.8rem; color: #64748b; margin-left: auto; }

  .layout { display: flex; height: calc(100vh - 57px); }

  /* Left panel — collections */
  .sidebar { width: 260px; background: #1e293b; border-right: 1px solid #334155; overflow-y: auto; flex-shrink: 0; }
  .sidebar-title { padding: 14px 16px 8px; font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .08em; }
  .col-item { padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all .15s; display: flex; justify-content: space-between; align-items: center; }
  .col-item:hover { background: #263449; }
  .col-item.active { background: #1d3a5f; border-left-color: #38bdf8; }
  .col-name { font-size: 0.88rem; font-weight: 600; }
  .col-badge { background: #334155; color: #94a3b8; font-size: 0.7rem; padding: 2px 7px; border-radius: 999px; }
  .col-item.active .col-badge { background: #0ea5e9; color: #fff; }

  /* Right panel — data */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .toolbar { padding: 14px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .toolbar h2 { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
  .toolbar .info { font-size: 0.78rem; color: #64748b; margin-left: auto; }
  .refresh-btn { background: #0ea5e9; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
  .refresh-btn:hover { background: #0284c7; }
  .auto-label { font-size: 0.78rem; color: #64748b; display: flex; align-items: center; gap: 6px; }
  .auto-label input { accent-color: #0ea5e9; }

  .table-wrap { flex: 1; overflow: auto; padding: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  thead th { background: #1e293b; color: #94a3b8; font-weight: 700; text-transform: uppercase; font-size: 0.7rem; letter-spacing: .06em; padding: 10px 14px; position: sticky; top: 0; text-align: left; border-bottom: 1px solid #334155; }
  tbody tr { border-bottom: 1px solid #1e293b; transition: background .1s; }
  tbody tr:hover { background: #1e3a5f22; }
  tbody td { padding: 9px 14px; color: #cbd5e1; vertical-align: top; }
  .lat-lng { font-family: monospace; color: #34d399; }
  .ts { color: #64748b; font-size: 0.75rem; }
  .empty { text-align: center; padding: 60px; color: #475569; }
  .empty i { font-size: 2.5rem; margin-bottom: 12px; display: block; }

  /* Map strip for lat/lng collections */
  .map-wrap { height: 220px; border-bottom: 1px solid #334155; display: none; }
  .map-wrap iframe { width: 100%; height: 100%; border: none; }

  .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #334155; gap: 12px; }
  .placeholder svg { width: 64px; opacity: .3; }
  .placeholder p { font-size: 1rem; color: #475569; }
</style>
</head>
<body>

<div class="header">
  <div class="dot"></div>
  <h1>MongoDB Live Viewer</h1>
  <span class="sub">gps_server_db &nbsp;·&nbsp; 150.129.165.162:27017</span>
</div>

<div class="layout">
  <!-- Collections sidebar -->
  <div class="sidebar">
    <div class="sidebar-title">Collections</div>
    <div id="colList">
      <div style="padding:20px;color:#475569;font-size:.82rem;">Loading...</div>
    </div>
  </div>

  <!-- Data panel -->
  <div class="main" id="mainPanel">
    <div class="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
      </svg>
      <p>Select a collection to view data</p>
    </div>
  </div>
</div>

<script>
let activeCol = null;
let autoRefresh = true;
let refreshTimer = null;

async function loadCollections() {
  const res = await fetch('/api/mongo_collections');
  const cols = await res.json();
  const el = document.getElementById('colList');
  if (!cols.length) { el.innerHTML = '<div style="padding:20px;color:#475569;font-size:.82rem;">No collections found</div>'; return; }

  el.innerHTML = cols.map(c => `
    <div class="col-item ${c.name === activeCol ? 'active' : ''}" onclick="selectCol('${c.name}')">
      <span class="col-name">${c.name}</span>
      <span class="col-badge">${c.count.toLocaleString()}</span>
    </div>
  `).join('');
}

async function selectCol(name) {
  activeCol = name;
  document.querySelectorAll('.col-item').forEach(el => el.classList.toggle('active', el.querySelector('.col-name').textContent === name));
  await loadData();
  clearInterval(refreshTimer);
  if (autoRefresh) refreshTimer = setInterval(loadData, 4000);
}

async function loadData() {
  if (!activeCol) return;
  const res = await fetch(`/api/mongo_data/${activeCol}`);
  const docs = await res.json();

  if (!docs.length) {
    document.getElementById('mainPanel').innerHTML = `
      <div class="toolbar"><h2>${activeCol}</h2><span class="info">0 documents</span></div>
      <div class="empty"><i>📭</i>No data in this collection yet.</div>`;
    return;
  }

  // Build columns from first doc keys
  const keys = Object.keys(docs[0]);
  const hasGPS = keys.includes('lat') && keys.includes('lng');

  let mapHtml = '';
  if (hasGPS && docs[0].lat && docs[0].lng) {
    const lat = docs[0].lat, lng = docs[0].lng;
    mapHtml = `<div class="map-wrap" style="display:block;">
      <iframe src="https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed"></iframe>
    </div>`;
  }

  const rows = docs.map(d => `
    <tr>${keys.map(k => {
      let val = d[k] ?? '';
      if (k === 'lat' || k === 'lng') return `<td class="lat-lng">${val}</td>`;
      if (k === 'timestamp') return `<td class="ts">${val}</td>`;
      return `<td>${val}</td>`;
    }).join('')}</tr>
  `).join('');

  document.getElementById('mainPanel').innerHTML = `
    <div class="toolbar">
      <h2>${activeCol}</h2>
      <span style="font-size:.75rem;color:#94a3b8;background:#1e293b;padding:3px 10px;border-radius:999px;">${docs.length} latest rows</span>
      <label class="auto-label"><input type="checkbox" ${autoRefresh?'checked':''} onchange="toggleAuto(this)"> Auto-refresh (4s)</label>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      <span class="info" id="lastRefresh"></span>
    </div>
    ${mapHtml}
    <div class="table-wrap">
      <table>
        <thead><tr>${keys.map(k=>`<th>${k}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
  await loadCollections(); // refresh counts
}

function toggleAuto(cb) {
  autoRefresh = cb.checked;
  clearInterval(refreshTimer);
  if (autoRefresh && activeCol) refreshTimer = setInterval(loadData, 4000);
}

// Init
loadCollections();
setInterval(loadCollections, 10000);
</script>
</body>
</html>
