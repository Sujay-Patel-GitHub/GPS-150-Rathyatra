<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ truck_id }} — Live Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;}
#map{width:100%;height:100%;}
.topbar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:1000;
    background:#fff;border:1px solid #e2e8f0;border-radius:12px;
    padding:8px 18px;display:flex;align-items:center;gap:14px;
    box-shadow:0 4px 16px rgba(0,0,0,.12);}
.tb-title{font-weight:700;font-size:0.9rem;color:#0f172a;display:flex;align-items:center;gap:8px;}
.tb-title i{color:#2563eb;}
.tb-badge{background:#dbeafe;color:#1e40af;padding:3px 10px;border-radius:6px;font-size:0.72rem;font-weight:700;}
.tb-speed{background:#f0fdf4;color:#166534;padding:3px 10px;border-radius:6px;font-size:0.72rem;font-weight:700;}
.tb-time{font-size:0.72rem;color:#64748b;}
.btn-logout{background:none;border:1px solid #e2e8f0;color:#64748b;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:0.78rem;display:flex;align-items:center;gap:5px;transition:all .2s;}
.btn-logout:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626;}
</style>
</head>
<body>
<div class="topbar">
    <div class="tb-title"><i class="fas fa-truck"></i> {{ truck_id }}</div>
    <span class="tb-badge">Live GPS</span>
    <span class="tb-speed" id="speedBadge"><i class="fas fa-tachometer-alt"></i> — km/h</span>
    <span class="tb-time" id="timeBadge"><i class="fas fa-clock"></i> —</span>
    <button class="btn-logout" onclick="location.href='/truck_logout'"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>
<div id="map"></div>
<script>
const TRUCK_ID = "{{ truck_id }}";
const map = L.map('map', { center:[23.0225,72.5714], zoom:13 });
L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
    maxZoom:20, subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);
const icon = L.divIcon({
    className:'',
    html:`<div style="position:relative;width:40px;height:48px;display:flex;justify-content:center;">
        <i class="fas fa-map-marker" style="color:#2563eb;font-size:2.5rem;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));"></i>
        <div style="position:absolute;top:6px;width:22px;height:22px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;">
            <i class="fas fa-truck" style="color:#2563eb;font-size:9px;"></i>
        </div></div>`,
    iconSize:[40,48], iconAnchor:[20,48], popupAnchor:[0,-48]
});
let marker=null, firstFix=true;
function refresh(){
    fetch('/get_vehicle_gps/'+encodeURIComponent(TRUCK_ID))
        .then(r=>r.json()).then(d=>{
            if(!d.lat||!d.has_gps) return;
            if(marker){ marker.setLatLng([d.lat,d.lng]); }
            else{ marker=L.marker([d.lat,d.lng],{icon}).addTo(map).bindPopup(`<b>${TRUCK_ID}</b>`); }
            if(firstFix){ map.setView([d.lat,d.lng],15); firstFix=false; }
            if(d.speed!==undefined) document.getElementById('speedBadge').innerHTML=`<i class="fas fa-tachometer-alt"></i> ${d.speed||0} km/h`;
            if(d.last_updated_time) document.getElementById('timeBadge').innerHTML=`<i class="fas fa-clock"></i> ${d.last_updated_time}`;
        }).catch(()=>{});
}
refresh();
setInterval(refresh,10000);
</script>
</body>
</html>
